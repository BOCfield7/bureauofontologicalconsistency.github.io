name: Auto-generate docs index

on:
  push:
    branches: ["main"]
    paths:
      - "docs/**"
      - "scripts/build_docs_index.py"
      - ".github/workflows/docs_index.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: python scripts/build_docs_index.py

      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git commit -m "Auto-generate docs index" || exit 0
          git push
